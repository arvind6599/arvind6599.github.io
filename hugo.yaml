baseURL: "https://arvind6599.github.io/"
languageCode: en-us
title: Arvind Menon
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  defaultTheme: dark
  disableThemeToggle: false

  title: Arvind Menon
  description: "Personal blog by Arvind Menon — AI builder, hackathon enthusiast, and math puzzle solver."
  keywords: [Blog, AI, Machine Learning, Hackathons, Software Engineering]
  author: Arvind Menon
  DateFormat: "January 2, 2006"

  # Post display options
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  ShowToc: true
  TocOpen: false
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false

  cover:
    hidden: false
    hiddenInList: false
    linkFullImages: true

  profileMode:
    enabled: true
    title: "Arvind Menon"
    subtitle: "Builder"
    imageUrl: "https://github.com/arvind6599.png"
    imageWidth: 120
    imageHeight: 120
    imageTitle: "Arvind Menon"
    buttons:
      - name: Posts
        url: posts
      - name: Projects
        url: projects

  socialIcons:
    - name: "LinkedIn"
      url: "https://www.linkedin.com/in/arvmenon/"
    - name: "GitHub"
      url: "https://github.com/arvind6599"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - name: "Home"
      url: ""
      weight: 1
    - name: "Posts"
      url: "posts/"
      weight: 2
    - name: "Projects"
      url: "projects/"
      weight: 3
    - name: "Publications"
      url: "publications/"
      weight: 4
    - name: "CV"
      url: "cv/"
      weight: 5
    - name: "Search"
      url: "search/"
      weight: 6

outputs:
  home:
    - HTML
    - RSS
    - JSON
